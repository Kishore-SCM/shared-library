image:
  repository: mycompany/service    # overridden by --set image.repository at deploy time
  tag:         latest               # overridden by --set image.tag
  pullPolicy:  IfNotPresent
 
service:
  type:        ClusterIP
  port:        80
  targetPort:  8080
 
replicaCount: 1
environment:  dev
 
resources:
  requests: { memory: "128Mi", cpu: "100m" }
  limits:   { memory: "256Mi", cpu: "250m" }
 
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
 
livenessProbe:
  httpGet: { path: /health, port: 8080 }
  initialDelaySeconds: 30
  periodSeconds: 10
 
readinessProbe:
  httpGet: { path: /ready, port: 8080 }
  initialDelaySeconds: 10
  periodSeconds: 5
 
podDisruptionBudget:
  enabled: false
  minAvailable: 1
 
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"


