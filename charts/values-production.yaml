# charts/values-production.yaml
 
replicaCount: 3
environment:  production
 
image:
  pullPolicy: Always
 
resources:
  requests: { memory: "256Mi", cpu: "250m" }
  limits:   { memory: "512Mi", cpu: "500m" }
 
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
 
ingress:
  enabled: true
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
 
podDisruptionBudget:
  enabled: true
  minAvailable: 2
 
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

