global:
  docker_repo:      "mycompany"
  slack_channel:    "#deployments"
  branch_to_deploy: "main"
  registry_type:    "dockerhub"    # dockerhub | ecr | gcr
 
services:
 
  - name: user-service
    repo: "https://github.com/myorg/user-service.git"
    language: java
    environment: production
    replicas: 3
    slack_channel: "#backend-team"
 
  - name: payment-service
    repo: "https://github.com/myorg/payment-service.git"
    language: python
    environment: production
    replicas: 3
 
  - name: notification-service
    repo: "https://github.com/myorg/notification-service.git"
    language: node
    environment: staging
    replicas: 2
 
